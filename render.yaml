services:
  - type: web
    name: safe-shamba-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/safe-shamba-ai
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health