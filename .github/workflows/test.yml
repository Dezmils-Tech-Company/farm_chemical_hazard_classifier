name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        # Install your project dependencies
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        # Install common web framework dependencies if not in requirements
        pip install fastapi uvicorn httpx
    
    - name: List directory structure for debugging
      run: |
        echo "Current directory:"
        pwd
        echo "Files in root:"
        ls -la
        echo "Tests directory contents:"
        ls -la tests/ || echo "No tests directory found"
        echo "All Python files:"
        find . -name "*.py" -type f | grep -v __pycache__ | head -20
    
    - name: Run pytest with verbose output
      run: |
        # Run pytest with detailed output
        pytest -v --collect-only
        # Actually run the tests
        pytest -v --tb=short || true  # Don't fail immediately
    
    - name: Run pytest (fail if no tests)
      run: |
        # This will fail if no tests are found (exit code 5)
        # But we'll make it more informative
        pytest -v --tb=short